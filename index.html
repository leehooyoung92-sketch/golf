<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>포지티브인베스트먼트 LP 초청 골프 세미나</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #8B1A2B;
      --color-primary-dark: #5C0E1B;
      --color-accent: #C5A55A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #9e9e9e; scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      max-width: 640px; margin: 0 auto;
      background: var(--color-primary);
      min-height: 100vh; min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
      color: #fff;
    }
    .logo {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-size: 28px; font-weight: 900;
      letter-spacing: 3px; line-height: 1.35;
      margin-bottom: 32px; text-transform: uppercase;
    }
    .divider { width: 40px; height: 1px; background: rgba(255,255,255,0.4); margin: 0 auto 24px; }
    .subtitle { font-size: 13px; letter-spacing: 6px; color: var(--color-accent); margin-bottom: 8px; }
    h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: 26px; font-weight: 700; line-height: 1.5; margin-bottom: 48px;
    }
    .select-label { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
    .venue-links { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; }
    .venue-link {
      display: block; padding: 20px; border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px; text-decoration: none; color: #fff;
      transition: all 0.25s ease; text-align: center;
    }
    .venue-link:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
    .venue-date { font-size: 13px; color: var(--color-accent); margin-bottom: 4px; }
    .venue-name { font-size: 17px; font-weight: 700; }
    footer { margin-top: 48px; font-size: 11px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <p class="logo">POSITIVE<br>INVESTMENT</p>
  <div class="divider"></div>
  <p class="subtitle">2026</p>
  <h1>LP 초청<br>골프 세미나</h1>
  <p class="select-label">행사를 선택해주세요</p>
  <div class="venue-links">
    <a href="lakeside/" class="venue-link">
      <p class="venue-date">6. 10 (화)</p>
      <p class="venue-name">레이크사이드 CC</p>
    </a>
    <a href="gapyeong/" class="venue-link">
      <p class="venue-date">6. 12 (목)</p>
      <p class="venue-name">가평베네스트</p>
    </a>
  </div>
  <footer>&copy; 2026 포지티브인베스트먼트</footer>
</body>
</html>
