<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800">
  <title>OG 섬네일 생성용</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    body { margin: 40px; background: #eee; font-family: 'Noto Sans KR', sans-serif; }
    h2 { margin: 20px 0 10px; font-size: 14px; color: #666; }
    .card {
      width: 800px; height: 400px;
      background: #8B1A2B;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; color: #fff;
      padding: 0 60px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 42px; font-weight: 900;
      letter-spacing: 4px; line-height: 1.15;
      margin-bottom: 8px; text-transform: uppercase;
    }
    .divider { width: 40px; height: 2px; background: rgba(255,255,255,0.4); margin-bottom: 8px; }
    .year { font-size: 14px; letter-spacing: 8px; color: #C5A55A; margin-bottom: 4px; }
    .title { font-size: 32px; font-weight: 700; line-height: 1.2; margin-bottom: 10px; }
    .date-box {
      border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
      padding: 8px 36px; font-size: 20px; font-weight: 500;
      letter-spacing: 1.5px; color: rgba(255,255,255,0.9);
    }
    p.instruction { margin-top: 8px; font-size: 12px; color: #999; }
  </style>
</head>
<body>

<h2>1. 레이크사이드CC — 스크린샷 후 레이크사이드섬네일.png로 저장</h2>
<div class="card">
  <p class="logo">POSITIVE<br>INVESTMENT</p>
  <div class="divider"></div>
  <p class="year">2026</p>
  <p class="title">LP 초청 골프 세미나</p>
  <div class="date-box">6. 10 (화) 레이크사이드 CC</div>
</div>
<p class="instruction">* 빨간 영역만 캡처 (800x400px)</p>

<br><br>

<h2>2. 가평베네스트 — 스크린샷 후 가평베네스트섬네일.png로 저장</h2>
<div class="card">
  <p class="logo">POSITIVE<br>INVESTMENT</p>
  <div class="divider"></div>
  <p class="year">2026</p>
  <p class="title">LP 초청 골프 세미나</p>
  <div class="date-box">6. 12 (목) 가평베네스트</div>
</div>
<p class="instruction">* 빨간 영역만 캡처 (800x400px)</p>

</body>
</html>
